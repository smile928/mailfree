name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "5ba6928b-6a52-4a0f-8c92-cde077f99099" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="smile"
ADMIN_PASSWORD="sk-lm-PND2k0SQ:r3SZZLrhoeIxcqSRNVxS"
GUEST_PASSWORD="sk-lm-PND2k0SQ:r3SZZLrhoeIxcqSRNVxS"
JWT_TOKEN="sk-lm-PND2k0SQ:r3SZZLrhoeIxcqSRNVxS"
JWT_TOKENGUEST_PASSWORD="sk-lm-PND2k0SQ:r3SZZLrhoeIxcqSRNVxS"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="mail2.aim.us.kg"
RESEND_API_KEY="sk-lm-PND2k0SQ:r3SZZLrhoeIxcqSRNVxS"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


